{% extends "admin/change_list.html" %}

{% block extrahead %}
{{ block.super }}
    <style>
    .midnight-fetch-btn {
      margin: 0;
      width: fit-content;
      height: fit-content;
      padding: 2px 5px;
      background-color: #309bbf;
      display: block;
    }
    .midnight-result {
      display: block;
      margin-left: 0 !important;
      margin-top: 5px;
    }
    </style>
<script>
(function () {
  async function fetchWithRetry(url, retries) {
    for (var i = 0; i < retries; i++) {
      try {
        var r = await fetch(url, {headers: {'X-Requested-With': 'XMLHttpRequest'}});
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return await r.json();
      } catch (e) {
        if (i === retries - 1) throw e;
        await new Promise(function(res) { setTimeout(res, 1000 * (i + 1)); });
      }
    }
  }

  async function fetchMidnight(btn) {
    var orgId = btn.dataset.orgId;
    var result = btn.nextElementSibling;
    btn.disabled = true;
    btn.textContent = '…';

    var counts = {level: '…', quality: '…', yield: '…'};
    var adminBase = '/admin/gwml2/';
    var midnight = 'organisation=' + orgId + '&time_of_day_from=00%3A00&time_of_day_to=00%3A00';
    var urls = {
      level:   adminBase + 'welllevelmeasurement/?' + midnight,
      quality: adminBase + 'wellqualitymeasurement/?' + midnight,
      'yield': adminBase + 'wellyieldmeasurement/?' + midnight,
    };
    function link(type, label) {
      if (counts[type] === '…' || counts[type] === 'err') {
        return label + ': <b>' + counts[type] + '</b>';
      }
      return label + ': <a href="' + urls[type] + '" target="_blank"><b>' + counts[type] + '</b></a>';
    }
    function update() {
      result.innerHTML =
        link('level',   'Level')   + '<br>' +
        link('quality', 'Quality') + '<br>' +
        link('yield',   'Yield');
    }
    update();

    var base = '/admin/gwml2/organisation/' + orgId + '/midnight-count/';
    await Promise.all(['level', 'quality', 'yield'].map(async function(type) {
      try {
        var data = await fetchWithRetry(base + type + '/', 3);
        counts[type] = data.count.toLocaleString();
      } catch (e) {
        counts[type] = 'err';
      }
      update();
    }));

    btn.textContent = 'Refresh';
    btn.disabled = false;
  }

  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('.midnight-fetch-btn').forEach(function(btn) {
      btn.addEventListener('click', function() { fetchMidnight(btn); });
    });
  });
}());
</script>
{% endblock %}
